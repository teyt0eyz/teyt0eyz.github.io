<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test AWS Module 2–14 (excl. 9)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #f9fafb;
    --border: #e8ecf0;
    --border2: #d1d9e0;
    --accent: #3b5bdb;
    --accent-light: #eef2ff;
    --accent-hover: #2f4ac7;
    --correct: #0f9b57;
    --correct-light: #edfaf3;
    --correct-border: #a7f3ca;
    --wrong: #e03131;
    --wrong-light: #fff5f5;
    --wrong-border: #ffc9c9;
    --text: #1a202c;
    --text2: #4a5568;
    --muted: #9aa5b4;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
    --shadow: 0 2px 8px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --r: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── QUIZ PAGE LAYOUT: full-height, no scroll on answer ── */
  #quiz-page {
    display: none;
    height: 100vh; height: 100dvh;
    display: none;
    flex-direction: column;
  }
  #quiz-page.active { display: flex; }

  /* HEADER */
  .qheader {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }
  .progress-center { display: flex; flex-direction: column; gap: 4px; }
  .progress-nums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--muted);
    text-align: center;
  }
  .progress-bar-outer {
    height: 4px; background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #845ef7 100%);
    border-radius: 99px; transition: width 0.5s ease;
  }
  .timer-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem; font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    border: 1px solid #c5d0f7;
    padding: 4px 10px; border-radius: 8px;
    min-width: 64px; text-align: center;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .timer-pill.urgent { color: var(--wrong); background: var(--wrong-light); border-color: var(--wrong-border); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

  /* MODULE TABS */
  .module-tabs {
    flex-shrink: 0;
    display: flex; gap: 5px; flex-wrap: nowrap;
    overflow-x: auto; padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .module-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; font-weight: 500;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text2);
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-btn.done { border-color: var(--correct-border); color: var(--correct); background: var(--correct-light); }
  .tab-btn.done.active { background: var(--correct); color: #fff; border-color: var(--correct); }

  /* MODULE SCORE STRIP */
  .mscore-strip {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .mscore-left {
    display: flex; align-items: center; gap: 6px;
  }
  .mscore-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; font-weight: 500;
    padding: 3px 8px; border-radius: 5px;
    background: var(--accent-light); color: var(--accent);
    border: 1px solid #c5d0f7;
  }
  .mscore-subtitle {
    font-size: 0.72rem; color: var(--text2); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 160px;
  }
  .mscore-right {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 500;
    flex-shrink: 0;
  }
  .mscore-c { color: var(--correct); }
  .mscore-w { color: var(--wrong); }
  .mscore-q { color: var(--accent); }
  .mscore-dot { color: var(--border2); }

  /* SCROLL AREA */
  .q-scroll {
    flex: 1; overflow-y: auto;
    padding: 14px 16px 8px;
    -webkit-overflow-scrolling: touch;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: qIn 0.2s ease;
  }
  @keyframes qIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .question-card.result-correct { border-color: var(--correct-border); }
  .question-card.result-wrong   { border-color: var(--wrong-border); }

  .q-meta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .q-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--muted);
  }
  .q-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
    padding: 2px 7px; border-radius: 4px;
    background: var(--accent-light); color: var(--accent);
    border: 1px solid #c5d0f7;
    letter-spacing: 0.04em;
  }
  .q-body { padding: 16px 16px 12px; }
  .q-text { font-size: 0.93rem; line-height: 1.65; font-weight: 600; color: var(--text); }

  /* OPTIONS */
  .options-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 7px; }
  .option-label {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px; border-radius: 10px;
    border: 1.5px solid var(--border);
    cursor: pointer; transition: border-color 0.12s, background 0.12s;
    background: var(--surface2);
    font-size: 0.85rem; line-height: 1.5; color: var(--text2);
    user-select: none;
  }
  .option-label:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); color: var(--text); }
  .option-label.selected:not(.locked) { border-color: var(--accent); background: var(--accent-light); color: var(--accent-hover); font-weight: 500; }
  .option-label input { margin-top: 2px; accent-color: var(--accent); flex-shrink: 0; }
  .option-label.show-correct { border-color: var(--correct-border)!important; background: var(--correct-light)!important; color: var(--correct)!important; font-weight: 500; }
  .option-label.show-wrong   { border-color: var(--wrong-border)!important;   background: var(--wrong-light)!important;   color: var(--wrong)!important; font-weight: 500; }
  .option-label.show-missed  { border-color: var(--correct-border)!important; background: var(--correct-light)!important; color: var(--correct)!important; opacity: 0.65; }
  .option-label.locked { cursor: default; }

  /* STICKY FOOTER NAV */
  .q-nav {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    gap: 10px;
  }
  .btn-back {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 0.83rem;
    padding: 10px 18px; border-radius: 10px;
    border: 1.5px solid var(--border2);
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.12s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-back:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  .btn-primary {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 0.88rem;
    padding: 11px 26px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff;
    cursor: pointer; transition: all 0.12s;
    box-shadow: 0 3px 10px rgba(59,91,219,0.28);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 5px 14px rgba(59,91,219,0.34); }
  .btn-primary:active { transform: translateY(0); }

  .result-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500;
    padding: 8px 14px; border-radius: 8px;
    display: flex; align-items: center; gap: 5px;
  }
  .result-pill.correct { background: var(--correct-light); color: var(--correct); border: 1px solid var(--correct-border); }
  .result-pill.wrong   { background: var(--wrong-light);   color: var(--wrong);   border: 1px solid var(--wrong-border); }

  /* ── START PAGE ── */
  #start-page {
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 20px;
  }
  .start-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: var(--shadow-md);
    max-width: 400px; width: 100%;
  }
  .start-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #845ef7 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 1.5rem;
    box-shadow: 0 6px 20px rgba(59,91,219,0.3);
  }
  .start-eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .start-title { font-size: 1.7rem; font-weight: 700; line-height: 1.2; color: var(--text); margin-bottom: 6px; }
  .start-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .start-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 28px;
  }
  .start-stat {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 8px;
  }
  .start-stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem; font-weight: 500; color: var(--accent);
    line-height: 1;
  }
  .start-stat-label { font-size: 0.62rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .start-btn {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 0.95rem;
    padding: 14px; border-radius: 12px; border: none; width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, #5c7cfa 100%);
    color: #fff; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(59,91,219,0.32);
    letter-spacing: 0.01em;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(59,91,219,0.36); }
  .start-btn:active { transform: translateY(0); }

  /* ── SCORE PAGE ── */
  #score-page {
    display: none;
    min-height: 100vh; min-height: 100dvh;
    padding: 24px 16px 40px;
    overflow-y: auto;
  }
  .score-hero {
    background: linear-gradient(135deg, var(--accent) 0%, #5c7cfa 100%);
    border-radius: 18px; padding: 28px 20px 24px;
    text-align: center; color: #fff;
    margin-bottom: 16px;
    box-shadow: 0 8px 28px rgba(59,91,219,0.3);
  }
  .score-label {
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.75; margin-bottom: 8px;
  }
  .score-pct {
    font-family: 'JetBrains Mono', monospace; font-size: 4rem; font-weight: 500;
    line-height: 1; margin-bottom: 4px;
  }
  .score-frac { font-size: 0.85rem; opacity: 0.8; }
  .score-stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 16px 0;
  }
  .score-stat-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 8px; text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .ssc-num {
    font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 500; line-height: 1;
  }
  .ssc-num.good { color: var(--correct); }
  .ssc-num.bad  { color: var(--wrong); }
  .ssc-num.time { color: var(--accent); }
  .ssc-label { font-size: 0.6rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .grade-badge {
    font-size: 0.82rem; font-weight: 600; padding: 8px 16px;
    border-radius: 8px; display: inline-block; margin: 4px 0 16px;
  }
  .grade-badge.A { background: var(--correct-light); color: var(--correct); border: 1px solid var(--correct-border); }
  .grade-badge.B { background: var(--accent-light);  color: var(--accent);  border: 1px solid #c5d0f7; }
  .grade-badge.C { background: #fff9db; color: #c07d00; border: 1px solid #ffe066; }
  .grade-badge.D { background: var(--wrong-light);   color: var(--wrong);   border: 1px solid var(--wrong-border); }

  /* MODULE BREAKDOWN CARDS */
  .breakdown-section { margin: 0 0 16px; }
  .breakdown-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 10px; padding: 0 2px;
  }
  .mod-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    margin-bottom: 7px; box-shadow: var(--shadow-sm);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center; gap: 10px;
  }
  .mc-left {}
  .mc-name {
    font-size: 0.78rem; font-weight: 700; color: var(--text); margin-bottom: 2px;
  }
  .mc-subtitle { font-size: 0.68rem; color: var(--muted); }
  .mc-right {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .mc-pip {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 500;
    padding: 3px 8px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .mc-pip.c { background: var(--correct-light); border-color: var(--correct-border); color: var(--correct); }
  .mc-pip.w { background: var(--wrong-light); border-color: var(--wrong-border); color: var(--wrong); }
  .mc-pip.s { color: var(--text2); }
  .mc-pip.p { color: var(--muted); }
  .mod-card.total-row {
    background: var(--accent-light); border-color: #c5d0f7;
  }
  .mod-card.total-row .mc-name { color: var(--accent); }
  .time-row {
    text-align: center; padding: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text2);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-sm);
  }
  .restart-btn {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 14px; border-radius: 12px; border: none; width: 100%;
    background: var(--accent); color: #fff; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(59,91,219,0.3);
    margin-top: 16px;
  }
  .restart-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── MODULE SELECTOR (start page) ── */
  .mode-tabs {
    display: flex; gap: 6px; margin-bottom: 20px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
    border: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
    font-size: 0.78rem; padding: 8px; border-radius: 7px; border: none;
    cursor: pointer; transition: all 0.15s;
    background: transparent; color: var(--muted);
  }
  .mode-tab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
  .mod-selector { display: none; margin-bottom: 20px; }
  .mod-selector.visible { display: block; }
  .mod-selector-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 12px;
  }
  .mod-sel-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; font-weight: 500;
    padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border2);
    background: var(--surface2); color: var(--text2); cursor: pointer;
    transition: all 0.12s; text-align: center; line-height: 1.3;
  }
  .mod-sel-btn span { display: block; font-size: 0.58rem; color: var(--muted); margin-top: 2px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 400; }
  .mod-sel-btn.selected { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .mod-sel-actions { display: flex; gap: 8px; margin-bottom: 12px; }
  .mod-sel-action { font-size: 0.72rem; color: var(--accent); background: none; border: none; cursor: pointer; padding: 2px; text-decoration: underline; }
  .mod-sel-count { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted); text-align: center; margin-bottom: 6px; }

  /* ── FINISH BUTTON ── */
  .btn-finish {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 0.78rem;
    padding: 8px 12px; border-radius: 8px;
    border: 1.5px solid var(--wrong-border);
    background: var(--wrong-light); color: var(--wrong);
    cursor: pointer; transition: all 0.12s;
    white-space: nowrap;
  }
  .btn-finish:hover { background: var(--wrong); color: #fff; border-color: var(--wrong); }

  /* ── REVIEW PAGE ── */
  #review-page {
    display: none;
    height: 100vh; height: 100dvh;
    flex-direction: column;
  }
  #review-page.active { display: flex; }
  .review-header {
    flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow-sm);
  }
  .btn-review-back {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 0.82rem;
    padding: 7px 14px; border-radius: 8px;
    border: 1.5px solid var(--border2);
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.12s; flex-shrink: 0;
  }
  .btn-review-back:hover { border-color: var(--accent); color: var(--accent); }
  .review-header-title { font-weight: 700; font-size: 0.9rem; color: var(--text); }
  .review-header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .review-mod-tabs {
    flex-shrink: 0;
    display: flex; gap: 5px; flex-wrap: nowrap; overflow-x: auto;
    padding: 8px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border); scrollbar-width: none;
  }
  .review-mod-tabs::-webkit-scrollbar { display: none; }
  .review-tab {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 500;
    padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--border2);
    background: var(--surface2); color: var(--text2); cursor: pointer;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .review-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .review-tab .rtab-score { font-size: 0.5rem; opacity: 0.8; }
  .review-tab.all-correct { border-color: var(--correct-border); color: var(--correct); background: var(--correct-light); }
  .review-tab.all-correct.active { background: var(--correct); color: #fff; border-color: var(--correct); }
  .review-tab.has-wrong { border-color: var(--wrong-border); color: var(--wrong); background: var(--wrong-light); }
  .review-tab.has-wrong.active { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  .review-scroll { flex: 1; overflow-y: auto; padding: 14px 16px 24px; -webkit-overflow-scrolling: touch; }
  .review-q-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }

  { id:2, title:"Module 2", subtitle:"Cloud Architecture & Well-Architected Framework", questions:[
    {q:"Which is the best definition of cloud architecture?",type:"radio",options:["Combining frontend and backend software and components to create highly available and scalable web services that meet the needs of an organization","Relocating traditional on-premises data centers to internet-accessible data centers that a vendor manages","Designing applications in cloud-based, shared IT infrastructure by using virtual machines and fault-tolerant data stores in the cloud","Applying cloud characteristics to a solution that uses cloud services and features to meet technical and business requirements"],answer:[3]},
    {q:"The AWS Well-Architected Framework has six pillars. Three of the pillars are security, operational excellence, and sustainability. What are two of the other pillars of the Well-Architected Framework? (Select TWO.)",type:"checkbox",options:["Reliability","Risk management","Governance","Privacy","Cost optimization"],answer:[0,4]},
    {q:"Which actions are consistent with the operational excellence pillar of the AWS Well-Architected Framework? (Select TWO.)",type:"checkbox",options:["Review and improve processes and procedures on a continuous cycle.","Plan and manage the full lifecycle of hardware assets.","Ensure operations personnel document changes to the infrastructure.","Evaluate organizational structures and roles to identify skill gaps.","Apply software engineering principles and methodology to infrastructure as code."],answer:[0,4]},

    {q:"A solutions architect is developing a process for handling server failures. Which process most closely follows AWS best practices?",type:"radio",options:["Amazon CloudWatch detects a system failure. It notifies the systems administrator, who provisions a new server by using the AWS Management Console.","Amazon CloudWatch detects a system failure. It initiates automation to provision a new server.","The operations staff detects a system failure. They notify the systems administrator, who provisions a new server by using the AWS Management Console.","The operations staff detects a system failure. They initiate automation to provision a new server."],answer:[1]},

    {q:"A company stores read-only data in Amazon S3. Most users are in the same country as the company headquarters. Some users are located around the world. Which design decision most closely follows AWS best practices?",type:"radio",options:["Use a bucket in the AWS Region that is closest to the company headquarters. All users access the data through Amazon CloudFront.","Use a bucket in the Region closest to the company headquarters.","Replicate objects across buckets in AWS Regions around the world. Users access the bucket in the Region closest that is to them.","Use a bucket in the Region that has the lowest average latency for all users."],answer:[0]},

    {q:"Which are main considerations that influence which AWS Regions to use? (Select TWO.)",type:"checkbox",options:["Application resiliency during system failures","Security and access control","Compliance with laws and regulations","Protection against localized natural disasters","Latency reduction for end users"],answer:[2,4]},
    {q:"Which are main considerations that influence which Availability Zones to use? (Select TWO.)",type:"checkbox",options:["Compliance with laws and regulations","Protection against localized natural disasters","Application resiliency during system failures","Latency reduction for end users","Security and access control"],answer:[1,2]}

    {q:"Which statements about responsibility are accurate based on the AWS shared responsibility model? (Select TWO.)",type:"checkbox",options:["AWS is responsible for host-based firewall configurations.","AWS is responsible for the configuration of security groups.","Customers are responsible for managing their user data.","Customers are responsible for the installation, maintenance, and decommissioning of the hardware that they use in the AWS data center.","AWS is responsible for the physical security of data centers."],answer:[2,4]},

// ── STATE ──
let quizModules = [];
let state = { currentModule:0, moduleQ:{}, answers:{}, submitted:{}, timerInterval:null, elapsed:0, shuffledOptions:{} };
let selectMode = 'all';
let selectedMods = new Set(MODULES.map((_,i)=>i));

const fmt = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
function arrEq(a,b){ return a.length===b.length&&a.every((v,i)=>v===b[i]); }

// Fisher-Yates shuffle — returns a new shuffled array
function shuffleArray(arr){
  const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a;
}

// Build shuffle maps for every question in quizModules
// shuffledOptions[key] = array of original indices in shuffled display order
// e.g. [2,0,3,1] means display position 0 → original opt 2, position 1 → original opt 0, etc.
function buildShuffleMaps(){
  const maps={};
  quizModules.forEach((mod,mi)=>{
    mod.questions.forEach((_,qi)=>{
      const key=`${mi}-${qi}`;
      maps[key]=shuffleArray(mod.questions[qi].options.map((_,i)=>i));
    });
  });
  return maps;
}

// ── INIT START PAGE ──
function initStartPage(){
  const grid = document.getElementById('mod-selector-grid');
  grid.innerHTML = MODULES.map((m,i)=>`
    <button class="mod-sel-btn ${selectedMods.has(i)?'selected':''}" onclick="toggleMod(${i})" id="msel-${i}">
      M${m.id}<span>${m.subtitle.split(' ').slice(0,2).join(' ')}</span>
    </button>`).join('');
  updateStartStats();
}

function setMode(mode, btn){
  selectMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const sel = document.getElementById('mod-selector');
  if(mode==='select'){ sel.classList.add('visible'); }
  else { sel.classList.remove('visible'); selectedMods=new Set(MODULES.map((_,i)=>i)); }
  updateStartStats();
}

function toggleMod(i){
  if(selectedMods.has(i)) selectedMods.delete(i); else selectedMods.add(i);
  const btn = document.getElementById(`msel-${i}`);
  btn.classList.toggle('selected', selectedMods.has(i));
  updateStartStats();
}

function selAll(){ MODULES.forEach((_,i)=>{ selectedMods.add(i); document.getElementById(`msel-${i}`).classList.add('selected'); }); updateStartStats(); }
function selNone(){ selectedMods.clear(); MODULES.forEach((_,i)=>document.getElementById(`msel-${i}`).classList.remove('selected')); updateStartStats(); }

function updateStartStats(){
  const mods = selectMode==='all' ? MODULES : MODULES.filter((_,i)=>selectedMods.has(i));
  const qCount = mods.reduce((s,m)=>s+m.questions.length,0);
  document.getElementById('total-q-count').textContent = qCount||'—';
  document.getElementById('mod-count-display').textContent = mods.length||'—';
  if(document.getElementById('mod-sel-count'))
    document.getElementById('mod-sel-count').textContent = `${mods.length} module${mods.length!==1?'s':''} · ${qCount} questions`;
  const btn = document.getElementById('start-btn');
  btn.disabled = qCount===0;
  btn.style.opacity = qCount===0 ? '0.4' : '1';
}

initStartPage();

// ── TIMER ──
function startTimer(){
  state.elapsed=0;
  state.timerInterval=setInterval(()=>{
    state.elapsed++;
    const el=document.getElementById('timer');
    if(el){el.textContent=fmt(state.elapsed);el.classList.toggle('urgent',state.elapsed>3600);}
  },1000);
}
function stopTimer(){clearInterval(state.timerInterval);}

// ── START ──
function startQuiz(){
  quizModules = selectMode==='all' ? MODULES : MODULES.filter((_,i)=>selectedMods.has(i));
  if(!quizModules.length) return;
  const maps = buildShuffleMaps();
  state={currentModule:0,moduleQ:{},answers:{},submitted:{},timerInterval:null,elapsed:0,shuffledOptions:maps};
  document.getElementById('start-page').style.display='none';
  document.getElementById('quiz-page').classList.add('active');
  renderTabs(); renderQ(); startTimer();
}

// ── FINISH EARLY ──
function confirmFinish(){
  const done=Object.keys(state.submitted).length;
  const total=quizModules.reduce((s,m)=>s+m.questions.length,0);
  const msg = done===0
    ? 'No questions answered yet. Exit the test?'
    : `Answered ${done} / ${total} questions.\nFinish and see results?`;
  if(confirm(msg)) showScore();
}

// ── TABS ──
function renderTabs(){
  document.getElementById('module-tabs').innerHTML=quizModules.map((m,i)=>{
    let c='tab-btn';
    if(i===state.currentModule)c+=' active';
    else if(isDone(i))c+=' done';
    return `<button class="${c}" onclick="switchMod(${i})">M${m.id}</button>`;
  }).join('');
}
function isDone(mi){ return quizModules[mi].questions.every((_,qi)=>state.submitted[`${mi}-${qi}`]); }
function switchMod(mi){ state.currentModule=mi; renderTabs(); renderQ(); const qs=document.getElementById('q-scroll'); if(qs) qs.scrollTop=0; }

// ── RENDER QUESTION ──
function renderQ(){
  const mi=state.currentModule;
  const qi=state.moduleQ[mi]||0;
  const mod=quizModules[mi], q=mod.questions[qi], key=`${mi}-${qi}`;
  const done=!!state.submitted[key], sel=state.answers[key]||[];

  const totalQ=quizModules.reduce((s,m)=>s+m.questions.length,0);
  const answered=Object.keys(state.submitted).length;
  document.getElementById('prog-label').textContent=`${answered} / ${totalQ}`;
  document.getElementById('prog-bar').style.width=`${(answered/totalQ)*100}%`;

  let modCorrect=0, modWrong=0;
  mod.questions.forEach((_,i)=>{
    const k=`${mi}-${i}`;
    if(state.submitted[k]){
      const s=(state.answers[k]||[]).slice().sort((a,b)=>a-b);
      if(arrEq(s,mod.questions[i].answer.slice().sort((a,b)=>a-b))) modCorrect++; else modWrong++;
    }
  });
  document.getElementById('ms-chip').textContent=mod.title;
  document.getElementById('ms-subtitle').textContent=mod.subtitle;
  document.getElementById('ms-right').innerHTML=`
    <span class="mscore-c">\u2713 ${modCorrect}</span>
    <span class="mscore-dot">\u00b7</span>
    <span class="mscore-w">\u2717 ${modWrong}</span>
    <span class="mscore-dot">\u00b7</span>
    <span class="mscore-q">${qi+1}/${mod.questions.length}</span>`;

  let gIdx=0; for(let i=0;i<mi;i++) gIdx+=quizModules[i].questions.length; gIdx+=qi+1;

  let cardCls='question-card';
  if(done){ const ok=arrEq(sel.slice().sort((a,b)=>a-b),q.answer.slice().sort((a,b)=>a-b)); cardCls+=ok?' result-correct':' result-wrong'; }

  let optsHtml='';
  // shuffleMap[displayPos] = originalIndex
  const shuffleMap = (state.shuffledOptions&&state.shuffledOptions[key]) || q.options.map((_,i)=>i);
  shuffleMap.forEach((origIdx, displayPos)=>{
    const opt=q.options[origIdx];
    const isSel=sel.includes(origIdx), isAns=q.answer.includes(origIdx);
    let lc='option-label';
    if(!done&&isSel) lc+=' selected';
    if(done){ lc+=' locked'; if(isAns&&isSel) lc+=' show-correct'; else if(!isAns&&isSel) lc+=' show-wrong'; else if(isAns&&!isSel) lc+=' show-missed'; }
    optsHtml+=`<label class="${lc}"><input type="${q.type}" name="q${key}" value="${origIdx}" ${isSel?'checked':''} ${done?'disabled':''} onchange="pick('${key}',${origIdx},'${q.type}')">${opt}</label>`;
  });

  document.getElementById('q-scroll').innerHTML=`
    <div class="${cardCls}">
      <div class="q-meta">
        <span class="q-counter">#${gIdx} overall</span>
        <span class="q-badge">${q.type==='checkbox'?'MULTI-SELECT':'SINGLE'}</span>
      </div>
      <div class="q-body"><div class="q-text">${q.q}</div></div>
      <div class="options-list">${optsHtml}</div>
    </div>`;

  const allDone=answered===totalQ;
  const isLast=qi===mod.questions.length-1;
  let navHtml=`<button class="btn-back" onclick="prev()" ${qi===0?'disabled':''}>← Back</button><div style="display:flex;gap:8px;align-items:center">`;
  if(!done){
    navHtml+=`<button class="btn-primary" id="btnck-${key}" onclick="check('${key}',${mi},${qi})">Check →</button>`;
  } else {
    const ok=arrEq(sel.slice().sort((a,b)=>a-b),q.answer.slice().sort((a,b)=>a-b));
    navHtml+=`<span class="result-pill ${ok?'correct':'wrong'}">${ok?'\u2713 Correct':'\u2717 Wrong'}</span>`;
    navHtml+=`<button class="btn-primary" onclick="next()">${allDone?'Results →':'Next →'}</button>`;
  }
  navHtml+='</div>';
  document.getElementById('q-nav').innerHTML=navHtml;
}

// ── INTERACTION ──
function pick(key,oi,type){
  if(state.submitted[key]) return;
  if(!state.answers[key]) state.answers[key]=[];
  if(type==='radio'){ state.answers[key]=[oi]; }
  else { const a=state.answers[key],p=a.indexOf(oi); if(p===-1)a.push(oi);else a.splice(p,1); }
  renderQ();
}

function check(key,mi,qi){
  const sel=state.answers[key]||[];
  if(sel.length===0){
    const b=document.getElementById(`btnck-${key}`);
    if(b){b.style.background='#e03131';b.textContent='Select an answer!';setTimeout(()=>{b.style.background='';b.textContent='Check →';},900);}
    return;
  }
  state.submitted[key]=true; renderTabs();
  const totalQ=quizModules.reduce((s,m)=>s+m.questions.length,0);
  const allDone=Object.keys(state.submitted).length===totalQ;
  const isLast=qi===quizModules[mi].questions.length-1;
  if(isLast&&allDone){ renderQ(); setTimeout(()=>showScore(),1200); }
  else { renderQ(); }
}

function next(){
  const mi=state.currentModule, mod=quizModules[mi];
  const qi=state.moduleQ[mi]||0;
  if(qi<mod.questions.length-1){ state.moduleQ[mi]=qi+1; renderQ(); }
  else {
    const totalQ=quizModules.reduce((s,m)=>s+m.questions.length,0);
    if(Object.keys(state.submitted).length===totalQ){ showScore(); return; }
    let nmi=mi+1;
    while(nmi<quizModules.length&&isDone(nmi)) nmi++;
    if(nmi<quizModules.length) switchMod(nmi); else { showScore(); return; }
  }
  const qs=document.getElementById('q-scroll'); if(qs) qs.scrollTop=0;
}

function prev(){
  const mi=state.currentModule, qi=state.moduleQ[mi]||0;
  if(qi>0){ state.moduleQ[mi]=qi-1; renderQ(); const qs=document.getElementById('q-scroll'); if(qs) qs.scrollTop=0; }
}

// ── SCORE ──
function showScore(){
  stopTimer();
  document.getElementById('quiz-page').classList.remove('active');
  document.getElementById('score-page').style.display='block';
  const totalQ=quizModules.reduce((s,m)=>s+m.questions.length,0);
  let correct=0;
  quizModules.forEach((mod,mi)=>{ mod.questions.forEach((q,qi)=>{
    const k=`${mi}-${qi}`,sel=(state.answers[k]||[]).slice().sort((a,b)=>a-b);
    if(arrEq(sel,q.answer.slice().sort((a,b)=>a-b))) correct++;
  }); });
  const pct=totalQ>0?Math.round(correct/totalQ*100):0;
  document.getElementById('score-pct').textContent=`${pct}%`;
  document.getElementById('score-fraction').textContent=`${correct} / ${totalQ} correct`;
  document.getElementById('score-correct').textContent=correct;
  document.getElementById('score-wrong').textContent=totalQ-correct;
  document.getElementById('score-time').textContent=fmt(state.elapsed);
  let g,t; if(pct>=90){g='A';t='Excellent — AWS Ready! \ud83c\udfc6';}else if(pct>=75){g='B';t='Good — Keep Practicing! \ud83d\udcaa';}else if(pct>=60){g='C';t='Fair — Review the Material \ud83d\udcd6';}else{g='D';t='Needs Work — Study More! \ud83d\udcda';}
  const el=document.getElementById('score-grade'); el.className=`grade-badge ${g}`; el.textContent=t;

  const mins=Math.floor(state.elapsed/60), secs=state.elapsed%60;
  const timeStr=state.elapsed<60?`${state.elapsed}s`:`${mins}m${secs>0?' '+secs+'s':''}`;
  let cards='';
  quizModules.forEach((mod,mi)=>{
    let mc=0,mw=0;
    mod.questions.forEach((_,qi)=>{
      const k=`${mi}-${qi}`;
      if(state.submitted[k]){ const s=(state.answers[k]||[]).slice().sort((a,b)=>a-b); if(arrEq(s,mod.questions[qi].answer.slice().sort((a,b)=>a-b))) mc++; else mw++; }
    });
    const mt=mod.questions.length, attempted=mc+mw, mp=mt>0?Math.round(mc/mt*100):0;
    cards+=`<div class="mod-card" onclick="openReview(${mi})" style="cursor:pointer;user-select:none">
      <div class="mc-left"><div class="mc-name">${mod.title}</div><div class="mc-subtitle">${mod.subtitle}</div></div>
      <div class="mc-right">
        <span class="mc-pip c">\u2713 ${mc}</span><span class="mc-pip w">\u2717 ${mw}</span>
        <span class="mc-pip s">${attempted}/${mt}</span><span class="mc-pip p">${mp}%</span>
        <span style="color:var(--muted);font-size:0.8rem;padding-left:2px">\u203a</span>
      </div></div>`;
  });
  cards+=`<div class="mod-card total-row">
    <div class="mc-left"><div class="mc-name">Total</div></div>
    <div class="mc-right">
      <span class="mc-pip c">\u2713 ${correct}</span><span class="mc-pip w">\u2717 ${totalQ-correct}</span>
      <span class="mc-pip s">${correct}/${totalQ}</span><span class="mc-pip p">${pct}%</span>
    </div></div>`;
  cards+=`<div class="time-row">\u23f1 ${fmt(state.elapsed)} \u00b7 ${timeStr}</div>`;
  document.getElementById('mod-cards').innerHTML=cards;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── REVIEW ──
let reviewModIdx=0;

function openReview(mi){
  reviewModIdx=mi;
  document.getElementById('score-page').style.display='none';
  document.getElementById('review-page').classList.add('active');
  renderReviewTabs();
  renderReviewQuestions(mi);
}

function closeReview(){
  document.getElementById('review-page').classList.remove('active');
  document.getElementById('score-page').style.display='block';
}

function renderReviewTabs(){
  const tabs=quizModules.map((mod,mi)=>{
    let mc=0,mw=0;
    mod.questions.forEach((_,qi)=>{
      const k=`${mi}-${qi}`;
      if(state.submitted[k]){ const s=(state.answers[k]||[]).slice().sort((a,b)=>a-b); if(arrEq(s,mod.questions[qi].answer.slice().sort((a,b)=>a-b))) mc++; else mw++; }
    });
    const attempted=mc+mw;
    let cls='review-tab';
    if(mi===reviewModIdx) cls+=' active';
    else if(attempted>0&&mw===0) cls+=' all-correct';
    else if(mw>0) cls+=' has-wrong';
    return `<button class="${cls}" onclick="switchReview(${mi})">M${mod.id}<span class="rtab-score">${mc}/${mod.questions.length}</span></button>`;
  }).join('');
  document.getElementById('review-mod-tabs').innerHTML=tabs;
}

function switchReview(mi){
  reviewModIdx=mi; renderReviewTabs(); renderReviewQuestions(mi);
  document.getElementById('review-scroll').scrollTop=0;
}

function renderReviewQuestions(mi){
  const mod=quizModules[mi];
  let mc=0,mw=0,na=0;
  const html=mod.questions.map((q,qi)=>{
    const k=`${mi}-${qi}`;
    const submitted=!!state.submitted[k];
    const sel=(state.answers[k]||[]).slice().sort((a,b)=>a-b);
    const isCorrect=submitted&&arrEq(sel,q.answer.slice().sort((a,b)=>a-b));
    if(submitted){ if(isCorrect) mc++; else mw++; } else na++;

    let gIdx=0; for(let i=0;i<mi;i++) gIdx+=quizModules[i].questions.length; gIdx+=qi+1;

    const cardCls='review-q-card'+(submitted?(isCorrect?' was-correct':' was-wrong'):'');
    const topCls='rq-top'+(submitted?(isCorrect?' correct-bg':' wrong-bg'):'');
    const resultLabel=!submitted?'— Not attempted':(isCorrect?'\u2713 Correct':'\u2717 Incorrect');
    const resultCls=!submitted?'rq-result':(isCorrect?'rq-result c':'rq-result w');

    const shuffleMap=(state.shuffledOptions&&state.shuffledOptions[k])||q.options.map((_,i)=>i);
    const opts=shuffleMap.map((origIdx)=>{
      const opt=q.options[origIdx];
      const isSel=(state.answers[k]||[]).includes(origIdx), isAns=q.answer.includes(origIdx);
      let cls='rq-opt', icon='';
      if(submitted){
        if(isAns&&isSel){cls+=' correct';icon='\u2713';}
        else if(!isAns&&isSel){cls+=' wrong';icon='\u2717';}
        else if(isAns&&!isSel){cls+=' missed';icon='\u25cb';}
      }
      return `<div class="${cls}"><span class="rq-opt-icon">${icon}</span>${opt}</div>`;
    }).join('');

    return `<div class="${cardCls}">
      <div class="${topCls}"><span class="rq-num">#${gIdx}</span><span class="${resultCls}">${resultLabel}</span></div>
      <div class="rq-q">${q.q}</div>
      <div class="rq-opts">${opts}</div>
    </div>`;
  }).join('');

  document.getElementById('review-title').textContent=`Review — ${mod.title}`;
  document.getElementById('review-sub').textContent=`${mc} correct · ${mw} wrong${na>0?' · '+na+' skipped':''}`;
  document.getElementById('review-scroll').innerHTML=html;
}

function restartQuiz(){
  stopTimer();
  state={currentModule:0,moduleQ:{},answers:{},submitted:{},timerInterval:null,elapsed:0,shuffledOptions:{}};
  document.getElementById('score-page').style.display='none';
  document.getElementById('start-page').style.display='flex';
  updateStartStats();
}
</script>
